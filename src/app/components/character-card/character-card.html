<button
  (click)="onCardClick()"
  (mousemove)="onMouseMove($event)"
  (mouseleave)="onMouseLeave($event)"
  [attr.data-rarity]="isGalaxyHolo() ? 'rare holo galaxy' : 'rare holo'"
  class="card"
>
  <div class="card__translater">
    <div class="card__rotator">
      <div class="card__front flex h-full flex-col justify-between overflow-hidden p-4">
        <div
          class="relative flex h-96 w-full items-center justify-center overflow-hidden rounded-xl bg-slate-950/30"
        >
          <img
            [src]="character().image"
            [alt]="character().name"
            class="h-full w-full object-contain p-4 drop-shadow-[0_0_10px_rgba(249,115,22,0.15)]"
          />
        </div>

        <div class="mt-4 flex flex-col gap-2">
          <div class="flex flex-wrap gap-1.5">
            <span
              class="rounded-full border border-orange-500/20 bg-orange-500/10 px-2.5 py-0.5 text-[10px] font-semibold text-orange-400"
            >
              {{ character().race }}
            </span>
            <span
              class="rounded-full border border-slate-700 bg-slate-800/80 px-2.5 py-0.5 text-[10px] text-slate-300"
            >
              {{ character().affiliation }}
            </span>
          </div>

          <h3 class="text-lg font-bold tracking-wide text-white transition-colors duration-200">
            {{ character().name }}
          </h3>

          <div class="mt-2 grid grid-cols-2 gap-2 border-t border-white/5 pt-3">
            <div>
              <p class="text-[9px] font-medium tracking-wider text-slate-400 uppercase">Base Ki</p>
              <p class="text-xs font-bold text-orange-300">{{ character().ki }}</p>
            </div>
            <div>
              <p class="text-[9px] font-medium tracking-wider text-slate-400 uppercase">Max Ki</p>
              <p class="text-xs font-bold text-orange-400">{{ character().maxKi }}</p>
            </div>
          </div>
        </div>
      </div>

      <div class="card__shine"></div>

      <div class="card__glare"></div>
    </div>
  </div>
</button>

<div
  class="mb-2 flex w-full flex-col gap-6 rounded-2xl border border-white/5 bg-slate-900/40 p-4 shadow-[0_8px_32px_rgba(0,0,0,0.37)] backdrop-blur-md md:flex-row md:items-end md:p-6"
>
  <div class="flex flex-1 flex-col gap-1.5">
    <label
      for="search-input"
      class="flex items-center gap-1.5 text-[10px] font-bold tracking-widest text-slate-400 uppercase"
    >
      <svg
        class="h-3.5 w-3.5 text-orange-500"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2.5"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        />
      </svg>
      Buscar Guerrero
    </label>
    <div class="relative">
      <input
        id="search-input"
        type="text"
        placeholder="Nombre del personaje (ej. Goku, Vegeta...)"
        [value]="search() || ''"
        (input)="search.set($any($event.target).value)"
        class="w-full rounded-xl border border-white/10 bg-slate-950/40 px-4 py-2.5 text-sm text-white placeholder-slate-500 shadow-inner transition-all duration-300 focus:border-orange-500/50 focus:ring-1 focus:ring-orange-500/50 focus:outline-none"
      />
    </div>
  </div>

  <div class="flex min-w-45 flex-col gap-1.5">
    <label
      for="gender-select"
      class="flex items-center gap-1.5 text-[10px] font-bold tracking-widest text-slate-400 uppercase"
    >
      <span>🚻</span>
      Género
    </label>
    <div class="relative">
      <select
        id="gender-select"
        [value]="gender() || ''"
        (change)="gender.set($any($event.target).value)"
        class="w-full cursor-pointer appearance-none rounded-xl border border-white/10 bg-slate-950/40 py-2.5 pr-10 pl-4 text-sm text-slate-300 transition-all duration-300 focus:border-orange-500/50 focus:outline-none"
      >
        @for (g of genders(); track g.value) {
          <option [value]="g.value" class="bg-slate-950 text-slate-300">{{ g.label }}</option>
        }
      </select>
      <div
        class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400"
      >
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 9l-7 7-7-7"
          />
        </svg>
      </div>
    </div>
  </div>

  <div class="flex min-w-45 flex-col gap-1.5">
    <label
      for="race-select"
      class="flex items-center gap-1.5 text-[10px] font-bold tracking-widest text-slate-400 uppercase"
    >
      <span>🧬</span>
      Raza
    </label>
    <div class="relative">
      <select
        id="race-select"
        [value]="race() || ''"
        (change)="race.set($any($event.target).value)"
        class="w-full cursor-pointer appearance-none rounded-xl border border-white/10 bg-slate-950/40 py-2.5 pr-10 pl-4 text-sm text-slate-300 transition-all duration-300 focus:border-orange-500/50 focus:outline-none"
      >
        @for (race of races(); track race.value) {
          <option [value]="race.value" class="bg-slate-950 text-slate-300">{{ race.label }}</option>
        }
      </select>
      <div
        class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400"
      >
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 9l-7 7-7-7"
          />
        </svg>
      </div>
    </div>
  </div>
</div>

<div class="space-y-4 pt-2">
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-1">
    <h4 class="text-[10px] font-black tracking-widest text-slate-500 uppercase">Transformaciones Disponibles</h4>
    <span class="text-[9px] font-bold text-orange-400 animate-pulse uppercase tracking-wider">👉 Haz clic en una fase para transformarlo</span>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
    @for (transformation of transformations(); track transformation.id) {
      <button
        (click)="activeImage.set(transformation.image)"
        [class.ring-2]="activeImage() === transformation.image"
        [class.ring-orange-500]="activeImage() === transformation.image"
        class="flex flex-col items-center rounded-2xl border border-white/5 bg-slate-955/20 hover:bg-slate-950/60 p-4 text-center transition-all duration-300 hover:border-orange-500/30 cursor-pointer active:scale-95 group shadow-sm hover:-translate-y-0.5"
      >
        <div class="h-28 w-full flex items-center justify-center mb-3 overflow-hidden">
          <img
            [src]="transformation.image"
            [alt]="transformation.name"
            class="h-full object-contain transition-transform duration-300 group-hover:scale-110 filter drop-shadow-[0_6px_10px_rgba(249,115,22,0.15)] group-hover:drop-shadow-[0_8px_18px_rgba(249,115,22,0.35)]"
          />
        </div>
        <h5 class="text-sm font-bold text-white line-clamp-1 group-hover:text-orange-400 transition-colors duration-300">
          {{ transformation.name }}
        </h5>
        <p class="mt-1 text-xs font-black text-orange-400">
          Ki: {{ transformation.ki }}
        </p>
      </button>
    } @empty {
      <div class="col-span-full py-8 text-center text-xs text-slate-500 border border-dashed border-white/5 rounded-xl">
        Este guerrero no posee transformaciones registradas.
      </div>
    }
  </div>
</div>
